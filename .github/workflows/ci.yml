name: VigilAI CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  PYTHON_VERSION: "3.11"
  # Prevent MLflow from trying to connect in CI
  MLFLOW_TRACKING_URI: sqlite:///./mlruns/mlflow_ci.db

jobs:
  # ── Lint ───────────────────────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install ruff
        run: pip install ruff~=0.4

      - name: Run ruff
        run: ruff check . --output-format=github

  # ── Unit Tests ─────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create required directories
        run: mkdir -p data ml/models rag/faiss_index mlruns

      - name: Generate synthetic data
        run: python data/generate_data.py --rows 500 --csv-only
        env:
          DATABASE_URL: sqlite:///./data/vigilai_test.db

      - name: Train ML models (CI mode, fast)
        run: python ml/train.py
        env:
          DATABASE_URL: sqlite:///./data/vigilai_test.db
          MLFLOW_TRACKING_URI: ${{ env.MLFLOW_TRACKING_URI }}

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v \
            --cov=. \
            --cov-report=xml \
            --cov-report=term-missing \
            --tb=short
        env:
          DATABASE_URL: sqlite:///./data/vigilai_test.db
          GOOGLE_API_KEY: ""
          GROQ_API_KEY: ""

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ── Docker Build Check ─────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build Validation
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          target: runtime
          push: false
          tags: vigilai-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Dashboard image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.dashboard
          target: runtime
          push: false
          tags: vigilai-dashboard:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
